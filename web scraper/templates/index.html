<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kompendium postów Sekuraka</title>
</head>
<body>
    <H1 style="font-size: 300%">Kompendium postów Sekuraka</H1>
    {% for i in content %}
        <a style="font-size: 200%; font-weight: bold" href="{{i['Link']}}"> {{i["Title"]}} </a>

        <div style="display:flex; flex-direction: row; margin-bottom: 1%">

            <b>TAGI: &emsp;</b>
            {% for j in i["Tags"].keys() %}
                <a href="{{i['Tags'][j]}}">{{j}}</a>
                &emsp;
            {% endfor %}


        </div>
    {% endfor %}
</body>
</html>
